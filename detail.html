<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Chi tiết đề thi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
     <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax Configuration & CDN -->
    <script>
        MathJax = {
            tex: {
                // Tắt hoàn toàn inline MathJax để tránh lỗi tự động xuống dòng trên một số môi trường
                inlineMath: [], 
                displayMath: [['$$', '$$']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
        </div>
        <h2 id="detail-title" class="nav-title">Đang tải...</h2>
        <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
    </nav>

    <div class="container detail-layout" id="exam-detail">
        <div class="pdf-container">
            <h3><i class="fa-solid fa-file-pdf"></i> Đề bài</h3>
            <iframe id="pdf-viewer" src="" width="100%" height="600px" style="border: none; border-radius: 8px;"></iframe>
        </div>
        <div class="solution-container">
            <h3><i class="fa-solid fa-lightbulb"></i> Hướng dẫn giải</h3>
            <div id="solution-content">
                <div class="loader">Đang tải lời giải...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="js/main.js"></script>
