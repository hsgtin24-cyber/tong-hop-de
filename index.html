<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho đề thi Tin học</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div style="width: 30px;"></div> 
        
        <div class="nav-title"><i class="fa-solid fa-code"></i> Kho Đề Tin Học</div>
        
        <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
    </nav>

    <div class="container layout">
        <aside class="sidebar">
            <h3><i class="fa-solid fa-filter"></i> Bộ lọc</h3>
            <div class="filter-group">
                <label>Năm thi</label>
                <select id="filter-year">
                    <option value="all">Tất cả các năm</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Kỳ thi</label>
                <select id="filter-type">
                    <option value="all">Tất cả kỳ thi</option>
                    <option value="Tin học trẻ">Tin học trẻ</option>
                    <option value="Olympic 10">Olympic 10</option>
                    <option value="Olympic 11">Olympic 11</option>
                    <option value="Học sinh giỏi 12">Học sinh giỏi 12</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Nhập tên đề bài hoặc từ khóa...">
            </div>
            <div id="exam-list" class="grid">
                </div>
        </main>
    </div>
<footer class="site-footer">
        &copy; 2026 Nguyễn Thanh Dương. All rights reserved.
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
